<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste NameToColor</title>
    <style>
        :root {
            --bg: #f5f1ea;
            --card: #fffdf7;
            --border: #d7cec0;
            --text: #2f241b;
            --muted: #74665a;
            --focus: #a3652a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 15% 20%, #fff6e7 0%, transparent 35%),
                radial-gradient(circle at 90% 80%, #efe4d4 0%, transparent 35%),
                var(--bg);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            padding: 24px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(84, 60, 36, 0.12);
            padding: 24px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
        }

        label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--muted);
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 1rem;
            color: var(--text);
            background: #ffffff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--focus);
            box-shadow: 0 0 0 4px rgba(163, 101, 42, 0.18);
        }

        .chip-wrap {
            margin-top: 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: background-color 0.2s, color 0.2s;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Teste do plugin NameToColor</h1>
        <form id="test-form" autocomplete="off">
            <label for="value-input">Digite um nome, ID, cor ou qualquer texto</label>
            <input id="value-input" type="text" placeholder="Ex.: Lucas, #00ff7f, rgb(255,0,0)">
            <div class="chip-wrap">
                <span id="color-chip" class="chip">Seu texto aparece aqui</span>
            </div>
        </form>
    </main>

    <script src="./NameToColor.js"></script>
    <script>
        const input = document.getElementById('value-input');
        const chip = document.getElementById('color-chip');
        const form = document.getElementById('test-form');

        form.addEventListener('submit', function (event) {
            event.preventDefault();
        });

        function fallbackReadableColor(hexColor) {
            if (typeof hexColor !== 'string') {
                return '#000000';
            }

            const text = hexColor.trim();
            if (!/^#[0-9a-fA-F]{6}$/.test(text)) {
                return '#000000';
            }

            const r = parseInt(text.slice(1, 3), 16);
            const g = parseInt(text.slice(3, 5), 16);
            const b = parseInt(text.slice(5, 7), 16);
            const luminance = (0.2126 * r) + (0.7152 * g) + (0.0722 * b);

            return luminance > 150 ? '#1a1a1a' : '#ffffff';
        }

        function getTextColor(value, backgroundColor) {
            if (typeof getReadableColor === 'function') {
                const readable = getReadableColor(value);

                if (Array.isArray(readable) && typeof readable[0] === 'string') {
                    return readable[0];
                }

                if (typeof readable === 'string') {
                    return readable;
                }
            }

            return fallbackReadableColor(backgroundColor);
        }

        function updateChip() {
            const value = input.value.trim();
            const source = value || 'preview';
            const backgroundColor = generateColor(source);
            const textColor = getTextColor(source, backgroundColor);

            chip.textContent = value || 'Seu texto aparece aqui';
            chip.style.backgroundColor = backgroundColor;
            chip.style.color = textColor;
        }

        input.addEventListener('input', updateChip);
        updateChip();
    </script>
</body>

</html>
